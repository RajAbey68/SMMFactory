<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Review Engine — SMMFactory</title>
  <meta name="description" content="Genuine guest review solicitation, sentiment tracking, and response management for Ko Lake Villa.">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-base:    #0d0f14;
      --bg-card:    #161922;
      --bg-raised:  #1e2330;
      --border:     #2a3044;
      --text-primary:   #f0f2f8;
      --text-secondary: #8892a4;
      --text-muted:     #545f75;
      --accent-green:  #2ecc71;
      --accent-amber:  #f39c12;
      --accent-blue:   #4a9eff;
      --accent-red:    #e74c3c;
      --accent-purple: #9b59b6;
      --radius: 12px;
      --radius-sm: 8px;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-base);
      color: var(--text-primary);
      min-height: 100vh;
    }

    /* ── Top Bar ── */
    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      height: 56px;
      background: var(--bg-card);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 1rem; }
    .logo-icon { font-size: 1.4rem; }
    .logo-sub { color: var(--text-secondary); font-weight: 400; font-size: 0.85rem; }
    .top-bar-right { display: flex; align-items: center; gap: 12px; }

    /* ── Layout ── */
    .main { max-width: 1200px; margin: 0 auto; padding: 28px 24px 80px; }

    /* ── Stats Strip ── */
    .stats-strip {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px;
      margin-bottom: 28px;
    }
    .stat-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 20px;
      transition: border-color 0.2s;
    }
    .stat-card:hover { border-color: var(--accent-blue); }
    .stat-value {
      font-size: 2rem;
      font-weight: 800;
      line-height: 1;
      margin-bottom: 4px;
    }
    .stat-label { font-size: 0.75rem; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.06em; }

    /* ── Section Titles ── */
    .section-title {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-muted);
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── Two-col layout ── */
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 28px; }
    @media (max-width: 768px) { .two-col { grid-template-columns: 1fr; } }

    /* ── Panel ── */
    .panel {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
    }
    .panel-title {
      font-size: 0.9rem;
      font-weight: 600;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text-primary);
    }

    /* ── Form ── */
    .form-group { margin-bottom: 14px; }
    .form-label {
      display: block;
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .form-input, .form-select, .form-textarea {
      width: 100%;
      background: var(--bg-raised);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      font-family: 'Inter', sans-serif;
      font-size: 0.875rem;
      padding: 10px 12px;
      outline: none;
      transition: border-color 0.2s;
    }
    .form-input:focus, .form-select:focus, .form-textarea:focus {
      border-color: var(--accent-blue);
    }
    .form-textarea { resize: vertical; min-height: 70px; }
    .form-select option { background: var(--bg-card); }

    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    @media (max-width: 500px) { .form-row { grid-template-columns: 1fr; } }

    /* ── Buttons ── */
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 10px 18px;
      border-radius: var(--radius-sm);
      font-family: 'Inter', sans-serif;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: opacity 0.15s, transform 0.1s;
    }
    .btn:active { transform: scale(0.98); }
    .btn--primary { background: var(--accent-blue); color: #fff; }
    .btn--primary:hover { opacity: 0.9; }
    .btn--success { background: var(--accent-green); color: #fff; }
    .btn--success:hover { opacity: 0.9; }
    .btn--ghost { background: var(--bg-raised); color: var(--text-primary); border: 1px solid var(--border); }
    .btn--ghost:hover { border-color: var(--accent-blue); }
    .btn--sm { padding: 6px 12px; font-size: 0.8rem; }
    .btn--full { width: 100%; justify-content: center; margin-top: 4px; }

    /* ── Due Requests List ── */
    .due-list { display: flex; flex-direction: column; gap: 10px; max-height: 400px; overflow-y: auto; }
    .due-item {
      background: var(--bg-raised);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 14px;
    }
    .due-item__header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 10px;
    }
    .due-item__name { font-weight: 600; font-size: 0.9rem; }
    .due-item__meta { font-size: 0.75rem; color: var(--text-secondary); margin-top: 2px; }
    .due-badge {
      font-size: 0.7rem;
      padding: 3px 8px;
      border-radius: 20px;
      font-weight: 600;
    }
    .due-badge--1 { background: rgba(46,204,113,0.15); color: var(--accent-green); }
    .due-badge--3 { background: rgba(243,156,18,0.15); color: var(--accent-amber); }
    .due-badge--7 { background: rgba(74,158,255,0.15); color: var(--accent-blue); }
    .due-item__message {
      font-size: 0.8rem;
      color: var(--text-secondary);
      background: var(--bg-base);
      border-radius: 6px;
      padding: 10px;
      margin-bottom: 10px;
      font-family: 'JetBrains Mono', monospace;
      line-height: 1.5;
    }
    .due-item__actions { display: flex; gap: 8px; flex-wrap: wrap; }

    /* ── Reviews List ── */
    .reviews-list { display: flex; flex-direction: column; gap: 10px; }
    .review-item {
      background: var(--bg-raised);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 14px;
    }
    .review-item__header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .review-item__name { font-weight: 600; font-size: 0.875rem; }
    .review-item__platform {
      font-size: 0.7rem;
      padding: 3px 8px;
      border-radius: 20px;
      font-weight: 600;
      text-transform: uppercase;
    }
    .platform-google   { background: rgba(66,133,244,0.15); color: #4285f4; }
    .platform-tripadvisor { background: rgba(52,168,83,0.15); color: #34a853; }
    .platform-booking  { background: rgba(3,115,252,0.15); color: #0373fc; }
    .stars { color: var(--accent-amber); letter-spacing: 2px; font-size: 0.9rem; }
    .review-item__text { font-size: 0.8rem; color: var(--text-secondary); margin: 8px 0; line-height: 1.5; }
    .review-item__response {
      font-size: 0.8rem;
      color: var(--accent-green);
      background: rgba(46,204,113,0.07);
      border: 1px solid rgba(46,204,113,0.2);
      border-radius: 6px;
      padding: 8px 10px;
      margin-top: 8px;
      line-height: 1.5;
    }
    .review-item__response-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      margin-bottom: 4px;
    }

    /* ── Empty State ── */
    .empty-state {
      text-align: center;
      padding: 32px 16px;
      color: var(--text-muted);
      font-size: 0.85rem;
    }
    .empty-state__icon { font-size: 2rem; margin-bottom: 8px; }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--bg-raised);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px 18px;
      font-size: 0.875rem;
      z-index: 999;
      animation: slideIn 0.2s ease;
      max-width: 320px;
    }
    .toast--success { border-color: var(--accent-green); color: var(--accent-green); }
    .toast--error   { border-color: var(--accent-red);   color: var(--accent-red); }
    @keyframes slideIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg-base); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>

<header class="top-bar">
  <div class="logo">
    <span class="logo-icon">⭐</span>
    <span>Review Engine</span>
    <span class="logo-sub">/ SMMFactory</span>
  </div>
  <div class="top-bar-right">
    <button class="btn btn--ghost btn--sm" id="refreshBtn">↻ Refresh</button>
  </div>
</header>

<main class="main">

  <!-- Stats Strip -->
  <div class="stats-strip" id="statsStrip">
    <div class="stat-card"><div class="stat-value" style="color:var(--accent-blue)">—</div><div class="stat-label">Total Guests</div></div>
    <div class="stat-card"><div class="stat-value" style="color:var(--accent-amber)">—</div><div class="stat-label">Requests Sent</div></div>
    <div class="stat-card"><div class="stat-value" style="color:var(--accent-green)">—</div><div class="stat-label">Reviews Received</div></div>
    <div class="stat-card"><div class="stat-value" style="color:var(--accent-purple)">—</div><div class="stat-label">Conversion Rate</div></div>
    <div class="stat-card"><div class="stat-value" style="color:var(--accent-amber)">—</div><div class="stat-label">Avg Rating</div></div>
    <div class="stat-card"><div class="stat-value" style="color:var(--accent-red)">—</div><div class="stat-label">Awaiting Response</div></div>
  </div>

  <!-- Row 1: Log Guest + Due Requests -->
  <div class="two-col">

    <!-- Log Guest Checkout -->
    <div class="panel">
      <div class="panel-title">🏨 Log Guest Checkout</div>
      <form id="guestForm">
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Guest Name *</label>
            <input class="form-input" id="g-name" type="text" placeholder="e.g. Sarah Johnson" required>
          </div>
          <div class="form-group">
            <label class="form-label">Checkout Date *</label>
            <input class="form-input" id="g-checkout" type="date" required>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">WhatsApp Number</label>
            <input class="form-input" id="g-whatsapp" type="tel" placeholder="+44 7911 123456">
          </div>
          <div class="form-group">
            <label class="form-label">Email Address</label>
            <input class="form-input" id="g-email" type="email" placeholder="guest@example.com">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Property</label>
            <select class="form-select" id="g-property">
              <option value="ko-lake-villa">Ko Lake Villa</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Contact via</label>
            <select class="form-select" id="g-contact">
              <option value="whatsapp">WhatsApp only</option>
              <option value="email">Email only</option>
              <option value="both">Both</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Nights stayed</label>
          <input class="form-input" id="g-nights" type="number" min="1" value="3">
        </div>
        <button type="submit" class="btn btn--primary btn--full">Add Guest + Schedule Requests</button>
      </form>
    </div>

    <!-- Due Requests Today -->
    <div class="panel">
      <div class="panel-title">📬 Review Requests Due Today</div>
      <div class="due-list" id="dueList">
        <div class="empty-state"><div class="empty-state__icon">📭</div>Loading…</div>
      </div>
    </div>

  </div>

  <!-- Row 2: Log Review + Reviews Feed -->
  <div class="two-col">

    <!-- Log a Review -->
    <div class="panel">
      <div class="panel-title">✍️ Log Incoming Review</div>
      <form id="reviewForm">
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Guest Name</label>
            <input class="form-input" id="r-name" type="text" placeholder="Name on review">
          </div>
          <div class="form-group">
            <label class="form-label">Rating *</label>
            <select class="form-select" id="r-rating" required>
              <option value="5">⭐⭐⭐⭐⭐ (5)</option>
              <option value="4">⭐⭐⭐⭐ (4)</option>
              <option value="3">⭐⭐⭐ (3)</option>
              <option value="2">⭐⭐ (2)</option>
              <option value="1">⭐ (1)</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Platform *</label>
            <select class="form-select" id="r-platform" required>
              <option value="google">Google</option>
              <option value="tripadvisor">TripAdvisor</option>
              <option value="booking">Booking.com</option>
              <option value="airbnb">Airbnb</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Property</label>
            <select class="form-select" id="r-property">
              <option value="ko-lake-villa">Ko Lake Villa</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Review Text</label>
          <textarea class="form-textarea" id="r-text" placeholder="Paste the review text here…"></textarea>
        </div>
        <div class="form-group">
          <label class="form-label">Review URL (optional)</label>
          <input class="form-input" id="r-url" type="url" placeholder="https://g.page/...">
        </div>
        <button type="submit" class="btn btn--success btn--full">Log Review + Generate Response Draft</button>
      </form>
    </div>

    <!-- Reviews Feed -->
    <div class="panel">
      <div class="panel-title">🗂️ Recent Reviews & Responses</div>
      <div class="reviews-list" id="reviewsList">
        <div class="empty-state"><div class="empty-state__icon">📭</div>No reviews logged yet.</div>
      </div>
    </div>

  </div>

</main>

<script>
  const API = 'http://localhost:3848';

  async function api(path, options = {}) {
    const res = await fetch(`${API}${path}`, {
      headers: { 'Content-Type': 'application/json' },
      ...options
    });
    return res.json();
  }

  function toast(msg, type = 'success') {
    const el = document.createElement('div');
    el.className = `toast toast--${type}`;
    el.textContent = msg;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 3500);
  }

  function stars(n) {
    return '⭐'.repeat(Math.max(0, Math.min(5, parseInt(n) || 0)));
  }

  // ── Load Stats ──────────────────────────────────────────
  async function loadStats() {
    try {
      const s = await api('/api/stats');
      const strip = document.getElementById('statsStrip');
      const vals = [
        s.total_guests,
        s.review_requested,
        s.review_received,
        s.conversion_rate,
        s.avg_rating,
        s.pending_response
      ];
      strip.querySelectorAll('.stat-value').forEach((el, i) => {
        el.textContent = vals[i] ?? '—';
      });
    } catch { /* server may not be running */ }
  }

  // ── Load Due Requests ────────────────────────────────────
  async function loadDueRequests() {
    const el = document.getElementById('dueList');
    try {
      const data = await api('/api/due-requests');
      if (!data.due || data.due.length === 0) {
        el.innerHTML = `<div class="empty-state"><div class="empty-state__icon">✅</div>No requests due today. Great job!</div>`;
        return;
      }

      el.innerHTML = data.due.map(item => `
        <div class="due-item" data-guest="${item.guest_id}" data-day="${item.day_offset}">
          <div class="due-item__header">
            <div>
              <div class="due-item__name">${item.guest_name}</div>
              <div class="due-item__meta">Checkout: ${item.checkout_date} · ${item.property}</div>
            </div>
            <span class="due-badge due-badge--${item.day_offset}">Day +${item.day_offset}</span>
          </div>
          ${item.whatsapp_message ? `
            <div class="due-item__message">${item.whatsapp_message}</div>
            <div class="due-item__actions">
              <a href="https://wa.me/${(item.whatsapp||'').replace(/\D/g,'')}?text=${encodeURIComponent(item.whatsapp_message)}"
                 target="_blank" class="btn btn--success btn--sm">Open in WhatsApp ↗</a>
              <button class="btn btn--ghost btn--sm copy-btn" data-text="${encodeURIComponent(item.whatsapp_message)}">📋 Copy</button>
              <button class="btn btn--ghost btn--sm mark-sent-btn" style="margin-left:auto">✓ Mark Sent</button>
            </div>
          ` : `
            <div class="due-item__actions">
              <button class="btn btn--ghost btn--sm mark-sent-btn">✓ Mark Email Sent</button>
            </div>
          `}
        </div>
      `).join('');

      // Wire buttons
      el.querySelectorAll('.copy-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          navigator.clipboard.writeText(decodeURIComponent(btn.dataset.text));
          toast('Message copied to clipboard');
        });
      });

      el.querySelectorAll('.mark-sent-btn').forEach(btn => {
        btn.addEventListener('click', async () => {
          const item = btn.closest('.due-item');
          try {
            await api('/api/mark-sent', {
              method: 'POST',
              body: JSON.stringify({
                guest_id: item.dataset.guest,
                day_offset: parseInt(item.dataset.day),
                channel: item.querySelector('a') ? 'whatsapp' : 'email'
              })
            });
            toast('Marked as sent ✓');
            await refreshAll();
          } catch { toast('Failed to mark sent', 'error'); }
        });
      });

    } catch {
      el.innerHTML = `<div class="empty-state"><div class="empty-state__icon">⚠️</div>Review Engine not running.<br>Start it with: <code>node server.mjs</code></div>`;
    }
  }

  // ── Load Reviews ─────────────────────────────────────────
  async function loadReviews() {
    const el = document.getElementById('reviewsList');
    try {
      const reviews = await api('/api/reviews');
      if (!reviews.length) {
        el.innerHTML = `<div class="empty-state"><div class="empty-state__icon">📭</div>No reviews logged yet.</div>`;
        return;
      }

      el.innerHTML = [...reviews].reverse().slice(0, 10).map(r => `
        <div class="review-item">
          <div class="review-item__header">
            <div class="review-item__name">${r.guest_name}</div>
            <span class="review-item__platform platform-${r.platform}">${r.platform}</span>
          </div>
          <div class="stars">${stars(r.rating)}</div>
          ${r.text ? `<div class="review-item__text">"${r.text}"</div>` : ''}
          ${r.response_draft ? `
            <div class="review-item__response">
              <div class="review-item__response-label">Suggested Response</div>
              ${r.response_draft}
            </div>
          ` : ''}
        </div>
      `).join('');
    } catch { /* handled above */ }
  }

  // ── Guest Form ────────────────────────────────────────────
  document.getElementById('guestForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    try {
      const data = {
        name: document.getElementById('g-name').value.trim(),
        checkout_date: document.getElementById('g-checkout').value,
        whatsapp: document.getElementById('g-whatsapp').value.trim(),
        email: document.getElementById('g-email').value.trim(),
        property: document.getElementById('g-property').value,
        contact: document.getElementById('g-contact').value,
        nights: parseInt(document.getElementById('g-nights').value) || 1
      };
      const res = await api('/api/guests', { method: 'POST', body: JSON.stringify(data) });
      if (res.success) {
        toast(`✅ ${data.name} added — review requests scheduled for Day +1, +3, +7`);
        e.target.reset();
        document.getElementById('g-checkout').valueAsDate = new Date();
        await refreshAll();
      } else {
        toast(res.error || 'Failed', 'error');
      }
    } catch { toast('Review Engine not running', 'error'); }
  });

  // ── Review Form ───────────────────────────────────────────
  document.getElementById('reviewForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    try {
      const data = {
        guest_name: document.getElementById('r-name').value.trim() || 'Anonymous',
        rating: parseInt(document.getElementById('r-rating').value),
        platform: document.getElementById('r-platform').value,
        property: document.getElementById('r-property').value,
        text: document.getElementById('r-text').value.trim(),
        url: document.getElementById('r-url').value.trim()
      };
      const res = await api('/api/reviews', { method: 'POST', body: JSON.stringify(data) });
      if (res.success) {
        toast(`⭐ Review logged + response draft generated`);
        e.target.reset();
        await refreshAll();
      } else {
        toast(res.error || 'Failed', 'error');
      }
    } catch { toast('Review Engine not running', 'error'); }
  });

  // ── Refresh ───────────────────────────────────────────────
  async function refreshAll() {
    await Promise.all([loadStats(), loadDueRequests(), loadReviews()]);
  }

  document.getElementById('refreshBtn').addEventListener('click', refreshAll);

  // ── Init ──────────────────────────────────────────────────
  document.getElementById('g-checkout').valueAsDate = new Date();
  refreshAll();
</script>
</body>
</html>
