name: Deploy Ads Pipeline

on:
  push:
    branches: [main]
    paths:
      - 'research/**'
      - 'creative/**'
      - 'landing-page/**'
      - 'campaigns/**'
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

env:
  GCS_BUCKET: marketing-studio-assets
  NODE_VERSION: '20'

jobs:
  # ── FOUR-EYES GATE: Quality + Security ──────────────────────────
  quality-gate:
    name: "🔒 Four-Eyes Quality Gate"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm ci

      - name: "📋 Validate configs"
        run: |
          for f in package.json storage.config.json mcp_config.json; do
            python3 -m json.tool "$f" > /dev/null && echo "✅ $f" || { echo "❌ $f"; exit 1; }
          done

      - name: "📂 Check directory structure"
        run: |
          for dir in research creative landing-page campaigns; do
            [ -d "$dir" ] && echo "✅ $dir/" || { echo "❌ $dir/"; exit 1; }
          done

      - name: "🧪 Run Truth Tests"
        run: npm test

  # ── SECURITY: Secret Scanning + CodeQL ──────────────────────────
  security-scan:
    name: "🛡️ Security Scan"
    runs-on: ubuntu-latest
    needs: quality-gate
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript

      - name: Run CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript-typescript"

  # ── BUILD: Landing Page ─────────────────────────────────────────
  build-landing-page:
    name: "🏗️ Build Landing Page"
    runs-on: ubuntu-latest
    needs: quality-gate
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        working-directory: landing-page
        run: |
          if [ -f package.json ]; then
            npm ci
            npm run build
          else
            echo "⚠️ No landing page package.json yet — skipping build"
          fi

      - name: Upload build artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: landing-page-build
          path: landing-page/dist/
          retention-days: 30

  # ── DEPLOY: Staging (requires manual approval for Production) ───
  deploy-staging:
    name: "🚀 Deploy to Staging"
    runs-on: ubuntu-latest
    needs: [quality-gate, security-scan, build-landing-page]
    environment:
      name: staging
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: landing-page-build
          path: landing-page/dist/

      - name: "☁️ Upload assets to GCS"
        uses: google-github-actions/upload-cloud-storage@v2
        with:
          path: landing-page/dist/
          destination: ${{ env.GCS_BUCKET }}/staging/
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ secrets.GCP_SA_KEY }}

      - name: "📊 Generate Campaign Summary"
        run: |
          echo "## Staging Deploy — $(date -u +%Y-%m-%dT%H:%M:%SZ)" > campaigns/deploy_report.md
          echo "- Bucket: gs://${{ env.GCS_BUCKET }}/staging/" >> campaigns/deploy_report.md
          echo "- Commit: ${{ github.sha }}" >> campaigns/deploy_report.md
          cat campaigns/deploy_report.md

  # ── PRODUCTION: Four-Eyes Manual Gate ───────────────────────────
  deploy-production:
    name: "🎯 Deploy to Production (Four-Eyes Approval)"
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment:
      name: production
      # This requires manual approval in GitHub Settings > Environments
    steps:
      - uses: actions/checkout@v4

      - name: "☁️ Promote to Production"
        uses: google-github-actions/upload-cloud-storage@v2
        with:
          path: landing-page/dist/
          destination: ${{ env.GCS_BUCKET }}/production/
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ secrets.GCP_SA_KEY }}

      - name: "✅ Production Deploy Complete"
        run: echo "🎯 Production deploy complete. Four-Eyes gate passed."
